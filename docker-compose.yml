version: "3.9"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: opsmind
      POSTGRES_PASSWORD: opsmind123
      POSTGRES_DB: opsmind_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opsmind"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://opsmind:opsmind123@db:5432/opsmind_db
      FLASK_ENV: production
      FLASK_APP: wsgi.py
    restart: unless-stopped
    networks:
      - opsgpt-network

  frontend:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - opsgpt-network

networks:
  opsgpt-network:
    driver: bridge

volumes:
  postgres_data:
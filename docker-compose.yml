version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: opsmind
      POSTGRES_PASSWORD: opsmind123
      POSTGRES_DB: opsmind_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opsmind"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://opsmind:opsmind123@db:5432/opsmind_db
      FLASK_ENV: production
    restart: unless-stopped

volumes:
  postgres_data: